<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel AIP</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#1e3c72;
  color:white;
  text-align:center;
}

.container{
  background:white;
  color:black;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

input, select, button{
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border:1px solid #ccc;
}

.asistio{ background:#2ecc71; color:white; }
.no{ background:#e74c3c; color:white; }
</style>
</head>

<body>

<h2>📊 Panel de Asistencia AIP</h2>

<div class="container">

<input type="text" id="buscador" placeholder="Buscar docente...">

<select id="filtroDia">
<option value="">Todos</option>
<option>Lunes</option>
<option>Martes</option>
<option>Miércoles</option>
<option>Jueves</option>
<option>Viernes</option>
</select>

<br>

<button onclick="exportarExcel()">📥 Excel</button>
<button onclick="verRanking()">🏆 Ranking Docentes</button>
<button onclick="verRankingGrados()">🏫 Ranking Grados</button>
<button onclick="verPorcentajes()">📊 % Asistencia</button>
<button onclick="generarInforme()">📄 Informe</button>

<table>
<thead>
<tr>
<th>Horario</th>
<th>Docente</th>
<th>Estado</th>
<th>Hora ingreso</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

<!-- RANKING DOCENTE -->
<div id="ranking" style="display:none;">
<h3>🏆 Ranking Docentes</h3>
<table>
<tbody id="tablaRanking"></tbody>
</table>
</div>

<!-- GRAFICO -->
<div id="rankingGrados" style="display:none;">
<h3>🏫 Ranking por Grado</h3>
<canvas id="grafico"></canvas>
</div>

<!-- PORCENTAJES -->
<div id="porcentajes" style="display:none;">
<h3>📊 Porcentajes</h3>

<h4>Docentes</h4>
<table><tbody id="tablaDocente"></tbody></table>

<h4>Grados</h4>
<table><tbody id="tablaGrado"></tbody></table>

</div>

</div>

<script>

// 🔐 CLAVE
const clave = prompt("Ingrese clave");
if(clave !== "1234"){
  document.body.innerHTML="";
}

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "A...",
  authDomain: "ingreso-al-aip---2026.firebaseapp.com",
  databaseURL: "https://ingreso-al-aip---2026-default-rtdb.firebaseio.com",
  projectId: "ingreso-al-aip---2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let datos = [];

const tabla = document.getElementById("tabla");

// 🔄 TIEMPO REAL
db.ref("reservas").on("value", snapshot=>{

  datos = [];

  snapshot.forEach(child=>{
    datos.push({
      horario: child.key,
      nombre: child.val().nombre,
      asistio: child.val().asistio || false,
      hora: child.val().horaIngreso || "-"
    });
  });

  mostrar();
});

// 🔍 MOSTRAR
function mostrar(){

  const texto = document.getElementById("buscador").value.toLowerCase();
  const dia = document.getElementById("filtroDia").value;

  tabla.innerHTML="";

  datos.forEach(d=>{

    if(texto && !d.nombre.toLowerCase().includes(texto)) return;
    if(dia && !d.horario.includes(dia)) return;

    let fila = document.createElement("tr");

    let estado = d.asistio ? "🟢 Asistió" : "🔴 No asistió";
    let clase = d.asistio ? "asistio" : "no";

    fila.innerHTML = `
      <td>${d.horario}</td>
      <td>${d.nombre}</td>
      <td class="${clase}">${estado}</td>
      <td>${d.hora}</td>
    `;

    tabla.appendChild(fila);

  });
}

document.getElementById("buscador").onkeyup = mostrar;
document.getElementById("filtroDia").onchange = mostrar;

// 📥 EXCEL
function exportarExcel(){
  let contenido="Horario,Docente,Estado,Hora\n";

  datos.forEach(d=>{
    let estado = d.asistio ? "Asistió" : "No asistió";
    contenido+=`${d.horario},${d.nombre},${estado},${d.hora}\n`;
  });

  const blob = new Blob([contenido]);
  const url = URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="reporte.csv";
  a.click();
}

// 🏆 RANKING DOCENTE
function verRanking(){

  let conteo={};

  datos.forEach(d=>{
    if(d.asistio){
      if(!conteo[d.nombre]) conteo[d.nombre]=0;
      conteo[d.nombre]++;
    }
  });

  let ranking=Object.entries(conteo).sort((a,b)=>b[1]-a[1]);

  const tablaRanking=document.getElementById("tablaRanking");
  tablaRanking.innerHTML="";

  ranking.forEach((r,i)=>{
    tablaRanking.innerHTML+=`<tr><td>${i+1}</td><td>${r[0]}</td><td>${r[1]}</td></tr>`;
  });

  document.getElementById("ranking").style.display="block";
}

// 🏫 GRAFICO
function verRankingGrados(){

  let conteo={};

  datos.forEach(d=>{
    if(d.asistio){
      let g=d.nombre.split("-")[0];
      if(!conteo[g]) conteo[g]=0;
      conteo[g]++;
    }
  });

  const ctx=document.getElementById("grafico");

  new Chart(ctx,{
    type:"bar",
    data:{
      labels:Object.keys(conteo),
      datasets:[{data:Object.values(conteo)}]
    }
  });

  document.getElementById("rankingGrados").style.display="block";
}

// 📊 PORCENTAJES
function verPorcentajes(){

  let total={}, asist={};

  datos.forEach(d=>{
    let doc=d.nombre;

    if(!total[doc]){ total[doc]=0; asist[doc]=0; }

    total[doc]++;
    if(d.asistio) asist[doc]++;
  });

  const tablaDocente=document.getElementById("tablaDocente");
  tablaDocente.innerHTML="";

  for(let d in total){
    let p=((asist[d]/total[d])*100).toFixed(1);
    tablaDocente.innerHTML+=`<tr><td>${d}</td><td>${p}%</td></tr>`;
  }

  document.getElementById("porcentajes").style.display="block";
}

// 📄 INFORME
function generarInforme(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let total = datos.length;
  let asistieron = datos.filter(d=>d.asistio).length;

  doc.text("INFORME AIP",20,20);
  doc.text("Total: "+total,20,30);
  doc.text("Asistieron: "+asistieron,20,40);

  doc.save("informe.pdf");
}

</script>

</body>
</html>
