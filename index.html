<script>

// FECHAS DE INICIO (Lunes) POR SEMANA
const fechasInicioSemana = {
  "Semana del 6 al 10 Abril":       new Date(2025, 3, 6),
  "Semana del 13 al 17 Abril":      new Date(2025, 3, 13),
  "Semana del 20 al 24 Abril":      new Date(2025, 3, 20),
  "Semana del 27 Abril al 1 Mayo":  new Date(2025, 3, 27),
  "Semana del 4 al 8 Mayo":         new Date(2025, 4, 4),
  "Semana del 11 al 15 Mayo":       new Date(2025, 4, 11),
  "Semana del 25 al 29 Mayo":       new Date(2025, 4, 25),
  "Semana del 1 al 5 Junio":        new Date(2025, 5, 1),
};

const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function obtenerFechasDias(semana) {
  const inicio = fechasInicioSemana[semana];
  if (!inicio) return ["Lunes","Martes","Miércoles","Jueves","Viernes"];
  const nombres = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
  return nombres.map((dia, i) => {
    const fecha = new Date(inicio);
    fecha.setDate(inicio.getDate() + i);
    return { nombre: dia, dia: fecha.getDate(), mes: meses[fecha.getMonth()] };
  });
}

function obtenerColor(nombre){
let hash=0;
for(let i=0;i<nombre.length;i++){
hash = nombre.charCodeAt(i) + ((hash<<5)-hash);
}
let color="#";
for(let i=0;i<3;i++){
let value=(hash>>(i*8))&255;
color+=("00"+value.toString(16)).slice(-2);
}
return color;
}

// FIREBASE
const firebaseConfig={
apiKey:"A...",
authDomain:"ingreso-al-aip---2026.firebaseapp.com",
databaseURL:"https://ingreso-al-aip---2026-default-rtdb.firebaseio.com",
projectId:"ingreso-al-aip---2026"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const dias=["Lunes","Martes","Miércoles","Jueves","Viernes"];
const horas=["1:00-1:45","1:45-2:30","2:30-3:15","3:15-4:00","RECREO","4:20-5:05","5:05-5:50","5:50-6:35","6:35-7:15"];

let seleccionados=[];

// HORARIO
function crearHorario(){
const semana = document.getElementById("semana").value;
const diasConFecha = obtenerFechasDias(semana);

const cont=document.getElementById("horarios");
cont.innerHTML="";
const tabla=document.createElement("table");

let header="<tr><th>Hora</th>";
diasConFecha.forEach(d => {
  if (typeof d === "object") {
    header += `<th>${d.nombre}<br><span class="fecha-dia">${d.dia} ${d.mes}</span></th>`;
  } else {
    header += `<th>${d}</th>`;
  }
});
header+="</tr>";
tabla.innerHTML=header;

horas.forEach(h=>{
if(h==="RECREO"){
tabla.innerHTML+=`<tr><td colspan="6" class="recreo">RECREO</td></tr>`;
return;
}
const esRefuerzo = h === "6:35-7:15";
let fila=`<tr><td${esRefuerzo ? ' class="refuerzo"' : ''}>${h}${esRefuerzo ? '<br><span style="font-size:10px">📚 REFUERZO ESCOLAR</span>' : ''}</td>`;
dias.forEach(d=>{
let id=d+" "+h;
fila+=`<td class="slot${esRefuerzo ? ' refuerzo-slot' : ''}" data-id="${id}" style="${esRefuerzo ? 'background:#f3e5f5;' : ''}">Disponible</td>`;
});
fila+="</tr>";
tabla.innerHTML+=fila;
});

cont.appendChild(tabla);

document.querySelectorAll(".slot").forEach(c=>{
c.onclick=()=>{
if(c.classList.contains("ocupado")) return;
const id=c.dataset.id;
if(seleccionados.includes(id)){
seleccionados=seleccionados.filter(x=>x!==id);
c.classList.remove("seleccionado");
return;
}
seleccionados.push(id);
c.classList.add("seleccionado");
};
});
}

// SEMANAS SIN BOLETA PDF
const semanasSinBoleta = [
  "Semana del 20 al 24 Abril",
  "Semana del 27 Abril al 1 Mayo",
  "Semana del 4 al 8 Mayo",
  "Semana del 11 al 15 Mayo",
  "Semana del 25 al 29 Mayo",
  "Semana del 1 al 5 Junio"
];

// RESERVAR
function reservar(){
const docente=document.getElementById("docente").value;
const semana=document.getElementById("semana").value;
const tema=document.getElementById("tema").value;
const esMantenimiento = docente === "MANTENIMIENTO SEMANAL";
const grado=esMantenimiento ? "PIP" : document.getElementById("grado").value;
const seccion=esMantenimiento ? "(YARVIN RS)" : document.getElementById("seccion").value;

if(!docente)return alert("Seleccione docente");
if(!esMantenimiento && !grado)return alert("Seleccione el grado");
if(!esMantenimiento && !seccion)return alert("Seleccione la sección");
if(!tema)return alert("Seleccione el tema de la sesión");
if(seleccionados.length===0)return alert("Seleccione horario");

const fecha=new Date().toLocaleString();

seleccionados.forEach(id=>{
db.ref("reservas/"+semana+"/"+id).set({
nombre:docente,
grado:grado,        // ✅ NUEVO
seccion:seccion,    // ✅ NUEVO
tema:tema,
asistio:false,
fecha:fecha
});
});

// Verificar si esta semana genera boleta
if(semanasSinBoleta.includes(semana)){
  seleccionados=[];
  document.querySelectorAll(".slot").forEach(x=>x.classList.remove("seleccionado"));
  cargar();
  return;
}

// QR y BOLETA PDF
const baseURL = window.location.origin + window.location.pathname;
const textoQR = baseURL + "?scan=" + encodeURIComponent(
  semana + "||" + seleccionados.join(",")
);

const { jsPDF } = window.jspdf;

QRCode.toDataURL(textoQR,function(err,url){
const doc=new jsPDF();

doc.text("BOLETA AIP",20,20);
doc.text("Docente: "+docente,20,40);
doc.text("Grado: "+grado+"  Sección: "+seccion,20,50);  // ✅ NUEVO

let y=60;
seleccionados.forEach(h=>{
doc.text("- "+h,20,y);
y+=10;
});

doc.addImage(url,"PNG",20,y+10,50,50);
doc.save("boleta.pdf");
});

seleccionados=[];
document.querySelectorAll(".slot").forEach(x=>x.classList.remove("seleccionado"));
cargar();
}

// QR
function detectarQR(){
const params=new URLSearchParams(window.location.search);
const data=params.get("scan");
if(!data)return;
const [semana,horarios]=data.split("||");
const lista=horarios.split(",");
lista.forEach(h=>{
db.ref("reservas/"+semana+"/"+h+"/asistio").set(true);
});
alert("Asistencia registrada");
window.location.href=window.location.pathname;
}

// CARGAR
function cargar(){
const semana=document.getElementById("semana").value;

document.querySelectorAll(".slot").forEach(s=>{
s.classList.remove("ocupado");
s.style.background="";
s.textContent="Disponible";
});

db.ref("reservas/"+semana).once("value",snap=>{
snap.forEach(child=>{
document.querySelectorAll(".slot").forEach(s=>{
if(s.dataset.id===child.key){
const nombre=child.val().nombre;
const tema=child.val().tema||"";
const grado=child.val().grado||"";      // ✅ NUEVO
const seccion=child.val().seccion||"";  // ✅ NUEVO
const color=obtenerColor(nombre);

s.classList.add("ocupado");
s.style.background=color;
s.style.color="white";

// ✅ Muestra grado y sección en el slot si están disponibles
const gradoSeccionTag = (grado || seccion)
  ? `<br><span style="font-size:10px;opacity:0.9">🎓 ${grado} ${seccion}</span>`
  : "";

s.innerHTML=`<b>${nombre}</b>${gradoSeccionTag}${tema ? `<br><span style="font-size:10px;opacity:0.9">📚 ${tema}</span>` : ""}`;
}
});
});
});

cargarAdmin();
cargarGrafico();
}

// ADMIN
function activarAdmin(){
if(prompt("Clave")=="yarvin2026"){
document.getElementById("adminPanel").style.display="block";
cargarAdmin();
cargarGrafico();
}
}

function cargarAdmin(){
const semana=document.getElementById("semana").value;
const tabla=document.getElementById("tabla");
tabla.innerHTML="";

db.ref("reservas/"+semana).once("value",snap=>{
snap.forEach(h=>{
tabla.innerHTML+=`
<tr>
<td>${semana}</td>
<td>${h.key}</td>
<td>${h.val().nombre}</td>
<td>${h.val().grado||"-"}</td>
<td>${h.val().seccion||"-"}</td>
<td>${h.val().tema||"-"}</td>
<td>${h.val().asistio?"🟢":"🔴"}</td>
<td>
<button onclick="asistio('${semana}','${h.key}')">✔</button>
<button onclick="eliminar('${semana}','${h.key}')">🗑</button>
</td>
</tr>`;
});
});
}

// GRAFICO
function cargarGrafico(){
const semana=document.getElementById("semana").value;
db.ref("reservas/"+semana).once("value",snap=>{
let total=0,asis=0;
snap.forEach(h=>{
total++;
if(h.val().asistio)asis++;
});
new Chart(document.getElementById("grafico"),{
type:"doughnut",
data:{
labels:["Asistió","Faltó"],
datasets:[{data:[asis,total-asis]}]
}
});
});
}

function asistio(s,h){
db.ref("reservas/"+s+"/"+h+"/asistio").set(true);
cargar();
}

function eliminar(s,h){
db.ref("reservas/"+s+"/"+h).remove();
cargar();
}

// EXCEL
function exportarExcel(){
const semana=document.getElementById("semana").value;
db.ref("reservas/"+semana).once("value",snap=>{

let csv="Semana,Horario,Docente,Grado,Sección,Tema,Asistencia\n";  // ✅ NUEVO

snap.forEach(h=>{
csv+=`${semana},${h.key},${h.val().nombre},${h.val().grado||"-"},${h.val().seccion||"-"},${h.val().tema||"-"},${h.val().asistio?"SI":"NO"}\n`;  // ✅ NUEVO
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="asistencia_"+semana+".csv";
a.click();
});
}

document.getElementById("semana").addEventListener("change",()=>{
  crearHorario();
  cargar();
});

// Lógica MANTENIMIENTO SEMANAL: oculta grado/sección, muestra PIP como responsable
document.getElementById("docente").addEventListener("change", function() {
  const esMantenimiento = this.value === "MANTENIMIENTO SEMANAL";
  const filaGS = document.getElementById("filaGradoSeccion");
  filaGS.style.display = esMantenimiento ? "none" : "flex";
  if (esMantenimiento) {
    document.getElementById("grado").value = "";
    document.getElementById("seccion").value = "";
  }
});

crearHorario();
cargar();
detectarQR();

// ============ CULTURA DIGITAL ============
const cdHoras = ["1:00-1:45","1:45-2:30","2:30-3:15","3:15-4:00","RECREO","4:20-5:05","5:05-5:50","5:50-6:35","6:35-7:15"];
let cdSeleccionados = [];

function cdCrearHorario() {
  const semana = document.getElementById("cd-semana").value;
  const diasConFecha = obtenerFechasDias(semana);
  const cont = document.getElementById("cd-horarios");
  cont.innerHTML = "";
  const tabla = document.createElement("table");
  tabla.style.width = "100%";
  tabla.style.borderCollapse = "collapse";

  let header = "<tr><th style='background:#00d4ff;color:#0f2027;padding:6px;font-size:11px'>Hora</th>";
  diasConFecha.forEach(d => {
    if (typeof d === "object") {
      header += `<th style='background:#00d4ff;color:#0f2027;padding:5px;font-size:11px'>${d.nombre}<br><span style='font-size:10px;opacity:0.8'>${d.dia} ${d.mes}</span></th>`;
    } else {
      header += `<th style='background:#00d4ff;color:#0f2027;padding:5px;font-size:11px'>${d}</th>`;
    }
  });
  header += "</tr>";
  tabla.innerHTML = header;

  cdHoras.forEach(h => {
    if (h === "RECREO") {
      tabla.innerHTML += `<tr><td colspan="6" class="cd-recreo" style="padding:5px;font-size:11px;text-align:center">RECREO</td></tr>`;
      return;
    }
    let fila = `<tr><td style="padding:5px;font-size:10px;border:1px solid #00d4ff44;background:#1a3a4a;color:#aad4ff;white-space:nowrap">${h}</td>`;
    dias.forEach(d => {
      const id = "CD|" + d + " " + h;
      fila += `<td class="cd-slot" data-cd-id="${id}" style="padding:4px;border:1px solid #00d4ff44;font-size:10px;text-align:center;cursor:pointer">Libre</td>`;
    });
    fila += "</tr>";
    tabla.innerHTML += fila;
  });

  cont.appendChild(tabla);

  document.querySelectorAll(".cd-slot").forEach(c => {
    c.onclick = () => {
      if (c.classList.contains("cd-ocupado")) return;
      const id = c.dataset.cdId;
      if (cdSeleccionados.includes(id)) {
        cdSeleccionados = cdSeleccionados.filter(x => x !== id);
        c.classList.remove("cd-seleccionado");
      } else {
        cdSeleccionados.push(id);
        c.classList.add("cd-seleccionado");
      }
    };
  });
}

function cdCargar() {
  const semana = document.getElementById("cd-semana").value;
  document.querySelectorAll(".cd-slot").forEach(s => {
    s.classList.remove("cd-ocupado");
    s.style.background = "";
    s.style.color = "";
    s.textContent = "Libre";
  });
  db.ref("culturaDigital/" + semana).once("value", snap => {
    snap.forEach(child => {
      document.querySelectorAll(".cd-slot").forEach(s => {
        if (s.dataset.cdId === child.key) {
          const grado = child.val().grado || "";
          const seccion = child.val().seccion || "";
          const tema = child.val().tema || "";
          s.classList.add("cd-ocupado");
          s.style.background = "#00d4ff";
          s.style.color = "#0f2027";
          s.innerHTML = `<b style='font-size:9px'>📚 ${grado} ${seccion}</b>${tema ? `<br><span style='font-size:9px'>${tema}</span>` : ""}`;
        }
      });
    });
  });
}

function cdReservar() {
  const semana = document.getElementById("cd-semana").value;
  const grado = document.getElementById("cd-grado").value;
  const seccion = document.getElementById("cd-seccion").value;
  const tema = document.getElementById("cd-tema").value;
  if (!grado) return alert("Seleccione el grado");
  if (!seccion) return alert("Seleccione la sección");
  if (!tema) return alert("Seleccione el tema");
  if (cdSeleccionados.length === 0) return alert("Seleccione al menos un horario");

  const fecha = new Date().toLocaleString();
  cdSeleccionados.forEach(id => {
    db.ref("culturaDigital/" + semana + "/" + id).set({
      nombre: "PIP - Cultura Digital",
      grado, seccion, tema,
      asistio: false,
      fecha
    });
  });

  cdSeleccionados = [];
  document.querySelectorAll(".cd-slot").forEach(x => x.classList.remove("cd-seleccionado"));
  cdCargar();
  alert("✅ Sesión de Cultura Digital registrada");
}

document.getElementById("cd-semana").addEventListener("change", () => {
  cdCrearHorario();
  cdCargar();
});

cdCrearHorario();
cdCargar();

</script>
