<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva AIP</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:white;
  text-align:center;
}

.header img {
  width:90px;
}

.container {
  background:white;
  color:black;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

select, button {
  width:90%;
  padding:10px;
  margin:8px;
}

.grid-container {
  overflow-x:auto;
}

.grid {
  display:grid;
  grid-template-columns: repeat(6,110px);
  gap:5px;
}

.slot { background:green; color:white; padding:10px; border-radius:8px; }
.ocupado { background:red; }
.recreo { background:gray; }
.seleccionado { background:orange; }
</style>
</head>

<body>

<div class="header">
  <img src="logo.jpeg">
  <h3>IE N° 0148 MAESTRO VÍCTOR RAÚL HAYA DE LA TORRE</h3>
  <h4>AULA DE INNOVACIÓN PEDAGÓGICA</h4>
</div>

<div class="container">

<select id="docente">
<option value="">Selecciona tutor</option>
<option>1° A - ARUHUANCA</option>
<option>2° A - CANDIA</option>
</select>

<button onclick="reservar()">Reservar</button>

<div class="grid-container">
  <div class="grid" id="tabla"></div>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "A...",
  authDomain: "ingreso-al-aip---2026.firebaseapp.com",
  databaseURL: "https://ingreso-al-aip---2026-default-rtdb.firebaseio.com",
  projectId: "ingreso-al-aip---2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const dias = ["Hora","Lunes","Martes","Miércoles","Jueves","Viernes"];
const horas = ["1:00-1:45","1:45-2:30","RECREO","4:20-5:05"];

let seleccionados = [];
const tabla = document.getElementById("tabla");

dias.forEach(d=>{
  let div=document.createElement("div");
  div.innerHTML="<b>"+d+"</b>";
  tabla.appendChild(div);
});

horas.forEach(h=>{
  dias.forEach((d,i)=>{
    let div=document.createElement("div");

    if(i===0){
      div.innerText=h;
    }else{
      if(h==="RECREO"){
        div.className="recreo";
      }else{
        div.className="slot";
        div.dataset.id = d + "-" + h;

        db.ref("reservas/"+div.dataset.id).on("value", snap=>{
          if(snap.exists()){
            div.classList.add("ocupado");
            div.innerText = snap.val().nombre;
          }
        });

        div.onclick=()=>{
          if(div.classList.contains("ocupado")) return;

          div.classList.toggle("seleccionado");

          if(seleccionados.includes(div)){
            seleccionados=seleccionados.filter(s=>s!==div);
          }else{
            seleccionados.push(div);
          }
        };
      }
    }

    tabla.appendChild(div);
  });
});

function reservar(){

  const docente = document.getElementById("docente").value;

  if(!docente) return alert("Selecciona tutor");
  if(seleccionados.length===0) return alert("Selecciona horario");

  const { jsPDF } = window.jspdf;

  db.ref("reservas").once("value", snapshot => {

    let yaReservo = false;

    snapshot.forEach(child=>{
      if(child.val().nombre === docente){
        yaReservo = true;
      }
    });

    if(yaReservo){
      alert("Este tutor ya realizó una reserva");
      return;
    }

    seleccionados.forEach(slot=>{
      const id = slot.dataset.id;

      db.ref("reservas/"+id).once("value", snap=>{
        if(snap.exists()){
          alert("Ese horario ya fue tomado");
          return;
        }

        const fecha = new Date().toLocaleString();

        db.ref("reservas/"+id).set({
          nombre: docente,
          fecha: fecha
        });

        const doc = new jsPDF();

        doc.text("BOLETA DE INGRESO AIP", 20, 20);
        doc.text("Tutor: " + docente, 20, 40);
        doc.text("Horario: " + id, 20, 50);
        doc.text("Fecha: " + fecha, 20, 60);
        doc.text("PIP: YARVIN RS", 20, 80);

        doc.save("boleta_AIP.pdf");
      });

    });

    alert("Reserva confirmada");
    seleccionados=[];

  });

}

</script>

</body>
</html>
