<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIP Reservas</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
}

.header img{
  width:100px;
  margin-top:10px;
}

.container{
  background:white;
  color:black;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

select, button{
  width:90%;
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:none;
}

.grid-container{
  overflow-x:auto;
}

.grid{
  display:grid;
  grid-template-columns: repeat(6,120px);
  gap:5px;
}

.slot{
  background:#2ecc71;
  color:white;
  padding:12px;
  border-radius:8px;
  font-size:12px;
}

.ocupado{ background:#e74c3c; }
.recreo{ background:#7f8c8d; }
.seleccionado{ background:#f39c12; }
</style>
</head>

<body>

<div class="header">
  <img src="logo.jpeg">
  <h3>IE N° 0148 MAESTRO VÍCTOR RAÚL HAYA DE LA TORRE</h3>
  <h4>AULA DE INNOVACIÓN PEDAGÓGICA - SECUNDARIA</h4>
</div>

<div class="container">

<button onclick="activarAdmin()">Modo Admin</button>

<select id="docente">
<option value="">Selecciona tutor</option>
<option>1° A - ARUHUANCA</option>
<option>2° A - CANDIA</option>
<option>3° A - TARRILLO</option>
<option>4° A - RUA</option>
<option>5° A - AZURIN</option>
</select>

<button onclick="reservar()">Reservar</button>

<div class="grid-container">
<div class="grid" id="tabla"></div>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "A...",
  authDomain: "ingreso-al-aip---2026.firebaseapp.com",
  databaseURL: "https://ingreso-al-aip---2026-default-rtdb.firebaseio.com",
  projectId: "ingreso-al-aip---2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let admin = false;

function activarAdmin(){
  const clave = prompt("Clave admin:");
  if(clave === "1234"){
    admin = true;
    alert("Modo admin activado");
  }
}

const dias = ["Hora","Lunes","Martes","Miércoles","Jueves","Viernes"];

const horas = [
"1:00-1:45","1:45-2:30","2:30-3:15","3:15-4:00",
"RECREO",
"4:20-5:05","5:05-5:50","5:50-6:35"
];

let seleccionados = [];
const tabla = document.getElementById("tabla");

dias.forEach(d=>{
  let div=document.createElement("div");
  div.innerHTML="<b>"+d+"</b>";
  tabla.appendChild(div);
});

horas.forEach(h=>{
  dias.forEach((d,i)=>{
    let div=document.createElement("div");

    if(i===0){
      div.innerText=h;
    }else{

      if(h==="RECREO"){
        div.className="recreo";
      }else{

        div.className="slot";
        div.dataset.id = d + "-" + h;

        db.ref("reservas/"+div.dataset.id).on("value", snap=>{
          if(snap.exists()){
            div.classList.add("ocupado");
            div.innerText = snap.val().nombre;
          }
        });

        div.onclick=()=>{
          if(div.classList.contains("ocupado")) return;

          div.classList.toggle("seleccionado");

          if(seleccionados.includes(div)){
            seleccionados=seleccionados.filter(s=>s!==div);
          }else{
            seleccionados.push(div);
          }
        };

        // ELIMINAR (ADMIN)
        div.oncontextmenu = (e)=>{
          e.preventDefault();
          if(admin){
            if(confirm("¿Eliminar reserva?")){
              db.ref("reservas/"+div.dataset.id).remove();
            }
          }
        };

      }
    }

    tabla.appendChild(div);
  });
});

function reservar(){

  const docente = document.getElementById("docente").value;

  if(!docente) return alert("Selecciona tutor");
  if(seleccionados.length===0) return alert("Selecciona horario");

  const { jsPDF } = window.jspdf;

  db.ref("reservas").once("value", snapshot=>{

    let yaReservo=false;

    snapshot.forEach(child=>{
      if(child.val().nombre === docente){
        yaReservo=true;
      }
    });

    if(yaReservo){
      alert("Este tutor ya reservó");
      return;
    }

    seleccionados.forEach(slot=>{

      const id = slot.dataset.id;

      db.ref("reservas/"+id).once("value", snap=>{
        if(snap.exists()){
          alert("Horario ocupado");
          return;
        }

        const fecha = new Date().toLocaleString();

        db.ref("reservas/"+id).set({
          nombre: docente,
          fecha: fecha
        });

        const doc = new jsPDF();

        doc.text("BOLETA AIP",20,20);
        doc.text("Tutor: "+docente,20,40);
        doc.text("Horario: "+id,20,50);

        const url = window.location.origin + window.location.pathname + "#" + id;

        const qrDiv = document.createElement("div");

        new QRCode(qrDiv,{
          text:url,
          width:100,
          height:100
        });

        setTimeout(()=>{
          const img = qrDiv.querySelector("img").src;
          doc.addImage(img,"PNG",140,20,50,50);
          doc.save("boleta.pdf");
        },500);

      });

    });

    alert("Reserva confirmada");
    seleccionados=[];

  });

}

// AUTO ASISTENCIA QR
window.onload = function(){

  const hash = window.location.hash;

  if(hash){

    const id = hash.replace("#","");

    db.ref("reservas/"+id).update({
      asistio:true,
      horaIngreso:new Date().toLocaleString()
    });

    alert("Asistencia registrada");

  }

};

// SERVICE WORKER
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
