<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIP PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#1e3c72;color:white;text-align:center}
.container{background:white;color:black;margin:10px;padding:10px;border-radius:10px}

select,button{padding:8px;margin:5px}

table{width:100%;border-collapse:collapse}
th{background:#2c3e50;color:white}
td{border:1px solid #ccc;padding:6px;font-size:12px}

.slot{cursor:pointer}
.slot.seleccionado{background:#2ecc71;color:white}
.slot.ocupado{background:#7f8c8d;color:white}

.recreo{background:#f39c12;color:white;font-weight:bold}

.admin{display:none}

/* 📱 RESPONSIVE */
@media(max-width:700px){
td{font-size:10px;padding:4px}
th{font-size:11px}
}
</style>
</head>

<body>

<h3>IE N° 0148 MAESTRO VÍCTOR RAÚL HAYA DE LA TORRE</h3>
<h4>AULA DE INNOVACIÓN PEDAGÓGICA</h4>

<div class="container">

<select id="semana">
<option>Semana 23-27 Marzo</option>
<option>Semana 30 Marzo - 2 Abril</option>
</select>

<br>

<select id="docente">
<option value="">Seleccione docente</option>
<option>REYNA TUESTA LUIS ENRIQUE</option>
<option>CRUZ YCHO, BEATRIZ</option>
<option>CARHUANCHO AVILES JANETH</option>
<option>SALAS HUAYLLA, JORGE VICENTE</option>
<option>CAMONES PULIDO, LEDGARDO</option>
<option>PADILLA SANCHEZ, LORD ENRIQUE</option>
<option>APAZA ROBLES ROBERTO JORGE</option>
<option>JÁUREGUI SÁNCHEZ MANUEL</option>
<option>VARILLAS ALANÍS, GENOVEVA</option>
<option>LINDO CASTRO, JAVIER</option>
<option>MAURICIO PERALES, BERNABE LUCIO</option>
<option>VERA INGA MANUEL SALOMÓN</option>
<option>MALAVER DIONICIO, ERIKA VERONICA</option>
<option>CASTILLO ROMÁN MARÍA LIZZI</option>
<option>RUA CARDENAS LISSET ROSALÍA</option>
<option>TARRILLO TEJADA, FAUSTO</option>
<option>ABANTO LEÓN IRMA</option>
<option>HUAMAN YALICO, IRMA FAUSTINA</option>
<option>MARTINEZ DURAND, ZOILA LILIANA</option>
<option>JUMPA CAMPUZANO, SILVIA JACKELINE</option>
<option>CHAVEZ MALAVER, CARMEN</option>
<option>LLIUYALL CONDOR, ROSARIO</option>
<option>WONG DELGADO, NIDIA ANGÉLICA</option>
<option>VERA PALOMINO, RINA ESTHER</option>
<option>CRISTOBAL, PATTY BELL</option>
<option>GAMERO AGUILAR, CÉSAR AUGUSTO</option>
<option>FLORES BERROCAL, MIGUEL ANGEL</option>
<option>LUNA GUERRA, WALTER RAFAEL</option>
<option>AZURIN SANTE, ELVIS</option>
<option>CANDIA AGUILAR, MARCO ANTONIO</option>
</select>

<div id="horarios"></div>

<button onclick="reservar()">Reservar</button>
<button onclick="activarAdmin()">🔐 Admin</button>

</div>

<!-- ADMIN -->
<div class="container admin" id="adminPanel">

<h3>Panel Admin</h3>

<button onclick="exportarExcel()">Excel</button>
<button onclick="verRanking()">Ranking</button>
<button onclick="verEstadisticas()">Estadísticas</button>

<table>
<thead>
<tr>
<th>Semana</th>
<th>Horario</th>
<th>Docente</th>
<th>Asistencia</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<canvas id="grafico"></canvas>

</div>

<script>

const firebaseConfig={
apiKey:"A...",
authDomain:"ingreso-al-aip---2026.firebaseapp.com",
databaseURL:"https://ingreso-al-aip---2026-default-rtdb.firebaseio.com",
projectId:"ingreso-al-aip---2026"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const dias=["Lunes","Martes","Miércoles","Jueves","Viernes"];
const horas=["1:00-1:45","1:45-2:30","2:30-3:15","3:15-4:00","RECREO","4:20-5:05","5:05-5:50","5:50-6:35"];

let seleccion=null;

function crearHorario(){

const cont=document.getElementById("horarios");
cont.innerHTML="";

const tabla=document.createElement("table");

let header="<tr><th>Hora</th>";
dias.forEach(d=>header+=`<th>${d}</th>`);
header+="</tr>";
tabla.innerHTML=header;

horas.forEach(h=>{

if(h==="RECREO"){
tabla.innerHTML+=`<tr><td colspan="6" class="recreo">RECREO 4:00-4:20</td></tr>`;
return;
}

let fila=`<tr><td>${h}</td>`;
dias.forEach(d=>{
let id=d+" "+h;
fila+=`<td class="slot" data-id="${id}">Disponible</td>`;
});
fila+="</tr>";
tabla.innerHTML+=fila;

});

cont.appendChild(tabla);

document.querySelectorAll(".slot").forEach(c=>{
c.onclick=()=>{
if(c.classList.contains("ocupado"))return;
document.querySelectorAll(".slot").forEach(x=>x.classList.remove("seleccionado"));
c.classList.add("seleccionado");
seleccion=c.dataset.id;
};
});

}

function reservar(){
const docente=document.getElementById("docente").value;
const semana=document.getElementById("semana").value;

if(!docente||!seleccion)return alert("Complete datos");

let ruta="reservas/"+semana+"/"+seleccion;

db.ref(ruta).once("value",snap=>{
if(snap.exists())return alert("Ocupado");

db.ref(ruta).set({nombre:docente,asistio:false});
cargar();
});
}

function cargar(){

const semana=document.getElementById("semana").value;

document.querySelectorAll(".slot").forEach(s=>{
s.classList.remove("ocupado");
s.textContent="Disponible";
});

db.ref("reservas/"+semana).once("value",snap=>{
snap.forEach(child=>{
document.querySelectorAll(".slot").forEach(s=>{
if(s.dataset.id===child.key){
s.classList.add("ocupado");
s.innerHTML=child.val().nombre;
}
});
});
});

cargarAdmin();
}

function activarAdmin(){
if(prompt("Clave")=="yarvin2026"){
document.getElementById("adminPanel").style.display="block";
cargarAdmin();
}
}

function cargarAdmin(){

const tabla=document.getElementById("tabla");
tabla.innerHTML="";

db.ref("reservas").once("value",snap=>{
snap.forEach(sem=>{
sem.forEach(h=>{
tabla.innerHTML+=`
<tr>
<td>${sem.key}</td>
<td>${h.key}</td>
<td>${h.val().nombre}</td>
<td>${h.val().asistio?"🟢":"🔴"}</td>
<td>
<button onclick="asistio('${sem.key}','${h.key}')">✔</button>
<button onclick="eliminar('${sem.key}','${h.key}')">🗑</button>
</td>
</tr>`;
});
});
});
}

function asistio(s,h){
db.ref("reservas/"+s+"/"+h+"/asistio").set(true);
cargar();
}

function eliminar(s,h){
db.ref("reservas/"+s+"/"+h).remove();
cargar();
}

function exportarExcel(){
db.ref("reservas").once("value",snap=>{
let csv="Semana,Horario,Docente\n";
snap.forEach(sem=>{
sem.forEach(h=>{
csv+=`${sem.key},${h.key},${h.val().nombre}\n`;
});
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="reporte.csv";
a.click();
});
}

function verRanking(){
db.ref("reservas").once("value",snap=>{
let cont={};
snap.forEach(sem=>{
sem.forEach(h=>{
let d=h.val();
if(d.asistio){
if(!cont[d.nombre])cont[d.nombre]=0;
cont[d.nombre]++;
}
});
});
alert(JSON.stringify(cont,null,2));
});
}

function verEstadisticas(){
db.ref("reservas").once("value",snap=>{
let total=0,asis=0;
snap.forEach(sem=>{
sem.forEach(h=>{
total++;
if(h.val().asistio)asis++;
});
});
new Chart(document.getElementById("grafico"),{
type:"doughnut",
data:{
labels:["Asistió","Faltó"],
datasets:[{data:[asis,total-asis]}]
}
});
});
}

document.getElementById("semana").addEventListener("change",cargar);

crearHorario();
cargar();

</script>

</body>
</html>
