<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva AIP</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align:center;
  margin:0;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:white;
}

/* Encabezado */
.header {
  padding:20px;
}

.header h1 {
  font-size:22px;
  margin:5px;
}

.header h3 {
  font-size:16px;
  font-weight:normal;
  margin:5px;
}

/* Caja principal */
.container {
  background:white;
  color:black;
  margin:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

select, button {
  padding:10px;
  margin:10px;
  border-radius:8px;
  border:none;
}

button {
  background:#3498db;
  color:white;
  cursor:pointer;
}

/* Tabla */
.grid {
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:5px;
  margin:20px 0;
}

.slot {
  background:#2ecc71;
  color:white;
  padding:10px;
  cursor:pointer;
  border-radius:6px;
}

.ocupado { background:#e74c3c; }
.recreo { background:#95a5a6; }
.seleccionado { background:#f39c12; }

.footer {
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- ENCABEZADO -->
<div class="header">
  <h1>IE N° 0148 MAESTRO VÍCTOR RAÚL HAYA DE LA TORRE</h1>
  <h3>AULA DE INNOVACIÓN PEDAGÓGICA - SECUNDARIA</h3>
</div>

<!-- CONTENIDO -->
<div class="container">

<h2>📅 Reserva de Horarios</h2>

<select id="docente">
<option value="">Selecciona tutor</option>
<option value="1° A - ARUHUANCA CCOPA HIPOLITO">1° A - ARUHUANCA</option>
<option value="2° A - CANDIA AGUILAR MARCO">2° A - CANDIA</option>
<option value="3° A - TARRILLO TEJADA FAUSTO">3° A - TARRILLO</option>
<option value="4° A - RUA CARDENAS LISSET">4° A - RUA</option>
<option value="5° A - AZURIN SANTE ELVIS">5° A - AZURIN</option>
</select>

<br>
<button onclick="reservar()">Reservar</button>

<div class="grid" id="tabla"></div>

<div class="footer">PIP: YARVIN RS</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "A...",
  authDomain: "ingreso-al-aip---2026.firebaseapp.com",
  databaseURL: "https://ingreso-al-aip---2026-default-rtdb.firebaseio.com",
  projectId: "ingreso-al-aip---2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const dias = ["Hora","Lunes","Martes","Miércoles","Jueves","Viernes"];

const horas = [
"1:00-1:45","1:45-2:30","2:30-3:15","3:15-4:00",
"RECREO",
"4:20-5:05","5:05-5:50","5:50-6:35"
];

let seleccionados = [];
const tabla = document.getElementById("tabla");

dias.forEach(d=>{
  let div=document.createElement("div");
  div.innerHTML="<b>"+d+"</b>";
  tabla.appendChild(div);
});

horas.forEach(h=>{
  dias.forEach((d,i)=>{
    let div=document.createElement("div");

    if(i===0){
      div.innerText=h;
    }else{
      if(h==="RECREO"){
        div.className="recreo";
      }else{
        div.className="slot";
        div.dataset.id = d + "-" + h;

        db.ref("reservas/"+div.dataset.id).on("value", snap=>{
          if(snap.exists()){
            div.classList.add("ocupado");
            div.innerText = snap.val().nombre;
          }
        });

        div.onclick=()=>{
          if(div.classList.contains("ocupado")) return;

          div.classList.toggle("seleccionado");

          if(seleccionados.includes(div)){
            seleccionados=seleccionados.filter(s=>s!==div);
          }else{
            seleccionados.push(div);
          }
        };
      }
    }

    tabla.appendChild(div);
  });
});

function reservar(){
  const docente=document.getElementById("docente").value;

  if(!docente) return alert("Selecciona tutor");
  if(seleccionados.length===0) return alert("Selecciona horario");

  const { jsPDF } = window.jspdf;

  seleccionados.forEach(slot=>{
    const id = slot.dataset.id;
    const fecha = new Date().toLocaleString();

    db.ref("reservas/"+id).set({
      nombre: docente,
      fecha: fecha
    });

    const doc = new jsPDF();

    doc.text("BOLETA DE INGRESO AIP", 20, 20);
    doc.text("Tutor: " + docente, 20, 40);
    doc.text("Horario: " + id, 20, 50);
    doc.text("Fecha: " + fecha, 20, 60);
    doc.text("PIP: YARVIN RS", 20, 80);

    doc.save("boleta_AIP.pdf");
  });

  alert("Reserva confirmada");
  seleccionados=[];
}

</script>

</body>
</html>
