<style>
body{

  margin:0;
  background:#1e3c72;

.header{

select,button{

table{

.slot.seleccionado{

.slot.ocupado{

  cursor:not-allowed;

.recreo{
  background:#f39c12;
  color:white;
  font-weight:bold;

.admin{

</head>

<body>

<option>CANDIA AGUILAR, MARCO ANTONIO</option>

</select>

<div id="horarios"></div>

<button onclick="reservar()">Reservar</button>
<button onclick="activarAdmin()">🔐 Admin</button>

</div>

<div class="container admin" id="adminPanel">
<h3>Panel Admin</h3>

<table>
<thead>
<tr>
<th>Semana</th>
<th>Horario</th>
<th>Docente</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>

const firebaseConfig={
apiKey:"A...",
authDomain:"ingreso-al-aip---2026.firebaseapp.com",
databaseURL:"https://ingreso-al-aip---2026-default-rtdb.firebaseio.com",
projectId:"ingreso-al-aip---2026"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const dias=["Lunes","Martes","Miércoles","Jueves","Viernes"];
const horas=[
"1:00-1:45","1:45-2:30","2:30-3:15","3:15-4:00",
"RECREO",
"4:20-5:05","5:05-5:50","5:50-6:35"
];

const cont=document.getElementById("horarios");
let seleccion=null;

const tabla=document.createElement("table");

let header="<tr><th>Hora</th>";
dias.forEach(d=>header+=`<th>${d}</th>`);
header+="</tr>";
tabla.innerHTML=header;

horas.forEach(h=>{

if(h==="RECREO"){
tabla.innerHTML+=`
<tr>
<td colspan="6" class="recreo">
☕ RECREO (4:00 - 4:20)
</td>
</tr>`;
return;
}

let fila=`<tr><td><b>${h}</b></td>`;

dias.forEach(d=>{
let id=d+" "+h;
fila+=`<td class="slot" data-id="${id}">Disponible</td>`;
});

fila+="</tr>";
tabla.innerHTML+=fila;

});

cont.appendChild(tabla);

document.querySelectorAll(".slot").forEach(celda=>{
celda.onclick=()=>{
if(celda.classList.contains("ocupado"))return;
document.querySelectorAll(".slot").forEach(c=>c.classList.remove("seleccionado"));
celda.classList.add("seleccionado");
seleccion=celda.dataset.id;
};
});

function reservar(){

const docente=document.getElementById("docente").value;
const semana=document.getElementById("semana").value;

if(!docente)return alert("Seleccione docente");
if(!seleccion)return alert("Seleccione horario");

let ruta="reservas/"+semana+"/"+seleccion;

db.ref(ruta).once("value",snap=>{
if(snap.exists())return alert("Ocupado");

db.ref(ruta).set({nombre:docente});
alert("Guardado");
cargar();
});
}

function cargar(){

const semana=document.getElementById("semana").value;

document.querySelectorAll(".slot").forEach(s=>{
s.classList.remove("ocupado");
s.textContent="Disponible";
});

db.ref("reservas/"+semana).once("value",snap=>{
snap.forEach(child=>{
document.querySelectorAll(".slot").forEach(s=>{
if(s.dataset.id===child.key){
s.classList.add("ocupado");
s.innerHTML="<b>"+child.val().nombre+"</b>";
}
});
});
});

cargarAdmin();
}

function activarAdmin(){
let clave=prompt("Clave:");
if(clave==="yarvin2026"){
document.getElementById("adminPanel").style.display="block";
}
}

function cargarAdmin(){
const tabla=document.getElementById("tabla");
tabla.innerHTML="";

db.ref("reservas").once("value",snap=>{
snap.forEach(sem=>{
sem.forEach(h=>{
tabla.innerHTML+=`
<tr>
<td>${sem.key}</td>
<td>${h.key}</td>
<td>${h.val().nombre}</td>
</tr>`;
});
});
});
}

document.getElementById("semana").addEventListener("change",cargar);

cargar();

</script>

</body>
</html>
