<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function play(f) {
        const o = audio.createOscillator(); const g = audio.createGain();
        o.connect(g); g.connect(audio.destination);
        o.frequency.value = f; o.start();
        g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 0.5);
        o.stop(audio.currentTime + 0.5);
    }

    // 🔥 LISTA DE NOMBRES DEL PDF (AGREGADO)
    const nombresPDF = [
        "ARUHUANCA CCOPA HIPOLITO",
        "VERA PALOMINO RINA ESTHER",
        "FLORES BERROCAL MIGUEL ANGEL",
        "JUMPA CAMPUZANO SILVIA JACKELINE",
        "LUNA GUERRA WALTER RAFAEL",

        "CANDIA AGUILAR MARCO ANTONIO",
        "CHAVEZ MALAVER CARMEN ELIZABETH",
        "ABANTO LEON IRMA",
        "HUAMAN YALICO IRMA FAUSTINA",
        "CASTILLO ROMÁN MARÍA LIZZI",

        "TARRILLO TEJADA FAUSTO",
        "WONG DELGADO NIDIA ANGELICA",
        "MAURICIO PERALES LUCIO",
        "GAMERO AGUILAR CESAR AUGUSTO",
        "DE LA CRUZ MARÍA",

        "RUA CARDENAS LISSET ROSALIA",
        "MALAVER DIONICIO ERIKA VERONICA",
        "CAMONES PULIDO LEDGARDO",
        "MARTINEZ DURAND ZOILA LILIANA",

        "AZURIN SANTE ELVIS",
        "LINDO CASTRO JAVIER ALEXIS",
        "VERA INGA MANUEL"
    ];

    const questions = {
        'SINÓNIMOS': {
            basico: [{p:"CASA", s:"HOGAR", d:["PATIO","PERRO","SOL"]}, {p:"FELIZ", s:"CONTENTO", d:["TRISTE","ENOJO","BAJO"]}],
            intermedio: [{p:"ALBOROZO", s:"ALEGRÍA", d:["PENA","CALMA","DUDA"]}],
            avanzado: [{p:"LÉXICO", s:"VOCABULARIO", d:["LIBRO","GRITO","CANTO"]}]
        },
        'ANTÓNIMOS': {
            basico: [{p:"DÍA", s:"NOCHE", d:["SOL","LUZ","CALOR"]}, {p:"FRÍO", s:"CALIENTE", d:["HELADO","NIEVE","GÉLIDO"]}],
            intermedio: [{p:"VALIENTE", s:"COBARDE", d:["FUERTE","OSADO","HÉROE"]}],
            avanzado: [{p:"EFÍMERO", s:"DURADERO", d:["BREVE","VELOZ","CORTO"]}]
        }
    };

    // Rellenar dinámicamente a 20 preguntas
    for(let m in questions) {
        for(let n in questions[m]) {
            while(questions[m][n].length < 20) {
                questions[m][n].push({p:`${m} ${n.toUpperCase()} ${questions[m][n].length+1}`, s:"CORRECTO", d:["ERROR1","ERROR2","ERROR3"]});
            }
        }
    }

    let state = { mode:'', name:'', lvl:'', idx:0, score:0, currentScreen: 'screen-mode' };

    function selectMode(m) {
        state.mode = m;
        changeScreen('screen-name');
    }

    function confirmName() {
        const n = document.getElementById('user-name').value;
        if(!n) return alert("¡Escribe tu nombre!");

        // 🔥 VALIDACIÓN OPCIONAL (NO OBLIGATORIA)
        // if(!nombresPDF.includes(n.toUpperCase())) {
        //     alert("Nombre no está en la lista de tutores");
        //     return;
        // }

        state.name = n.toUpperCase();
        document.getElementById('disp-name').innerText = state.name;
        document.getElementById('lvl-title').innerText = state.mode;
        changeScreen('screen-levels');
    }

    function startLvl(l) {
        state.lvl = l; state.idx = 0; state.score = 0;
        document.getElementById('mode-label').innerText = state.mode;
        changeScreen('screen-quiz');
        loadQ();
    }

    function loadQ() {
        const q = questions[state.mode][state.lvl][state.idx];
        document.getElementById('word-txt').innerText = q.p;
        document.getElementById('disp-count').innerText = `${state.idx + 1}/20`;
        document.getElementById('disp-score').innerText = state.score;
        document.getElementById('avatar').innerText = "🦸‍♂️";
        
        let opts = [...q.d, q.s].sort(() => Math.random() - 0.5);
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        const clrs = ['c-azul','c-nara','c-mora','c-amar'];
        
        opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = `opt-box ${clrs[i]}`;
            b.innerText = o;
            b.onclick = () => check(o, q.s, b);
            box.appendChild(b);
        });
        speak(q.p);
    }

    function check(sel, cor, btn) {
        const all = document.querySelectorAll('.opt-box');
        all.forEach(b => b.disabled = true);

        if(sel === cor) {
            state.score++;
            btn.style.background = "#4caf50"; btn.style.color = "white";
            document.getElementById('avatar').innerText = "🎉";
            play(800);
            setTimeout(() => {
                state.idx++;
                if(state.idx < 20) loadQ(); else finish();
            }, 1500);
        } else {
            btn.style.background = "#f44336"; btn.style.color = "white";
            document.getElementById('avatar').innerText = "🙂";
            play(200);
            all.forEach(b => { if(b.innerText === cor) b.style.border = "6px solid #4caf50"; });
        }
    }

    function finish() {
        document.getElementById('options-box').innerHTML = "";
        document.getElementById('word-txt').innerText = "¡LOGRADO!";
        document.getElementById('final-box').classList.remove('hidden');
        document.getElementById('res-detail').innerHTML = `Superaste el nivel <b>${state.lvl.toUpperCase()}</b>.<br>Puntos: <b>${state.score}/20</b>`;
    }

    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        state.currentScreen = id;
        const btnAtras = document.getElementById('nav-atras');
        (id === 'screen-mode') ? btnAtras.classList.add('hidden') : btnAtras.classList.remove('hidden');
    }

    function goBack() {
        if(state.currentScreen === 'screen-name') changeScreen('screen-mode');
        else if(state.currentScreen === 'screen-levels') changeScreen('screen-mode');
        else if(state.currentScreen === 'screen-quiz') changeScreen('screen-levels');
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t); u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
    }
</script>
