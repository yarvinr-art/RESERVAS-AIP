<style>

</style>

<body>

</div>

<div class="container">

<select id="semana">

<br>

<select id="docente">

<option>APAZA ROBLES ROBERTO JORGE</option>
<option>JÁUREGUI SÁNCHEZ MANUEL</option>
<option>VARILLAS ALANÍS, GENOVEVA</option>
<option>LINDO CASTRO, JAVIER</option>
<option>MAURICIO PERALES, BERNABE LUCIO</option>
<option>VERA INGA MANUEL SALOMÓN</option>
<option>MALAVER DIONICIO, ERIKA VERONICA</option>
<option>CASTILLO ROMÁN MARÍA LIZZI</option>
<option>RUA CARDENAS LISSET ROSALÍA</option>

<option>ABANTO LEÓN IRMA</option>
<option>HUAMAN YALICO, IRMA FAUSTINA</option>
<option>MARTINEZ DURAND, ZOILA LILIANA</option>

<option>LUNA GUERRA, WALTER RAFAEL</option>
<option>AZURIN SANTE, ELVIS</option>
<option>CANDIA AGUILAR, MARCO ANTONIO</option>
</select>

<div id="horarios"></div>

<button onclick="reservar()">Reservar</button>
<button onclick="activarAdmin()">🔐 Admin</button>

</div>

<!-- ADMIN -->
<div class="container admin" id="adminPanel">

<h3>Panel Admin</h3>

<button onclick="exportarExcel()">Excel</button>
<button onclick="verRanking()">Ranking</button>
<button onclick="verEstadisticas()">Estadísticas</button>

<table>
<thead>
<tr>
<th>Semana</th>
<th>Horario</th>
<th>Docente</th>
<th>Asistencia</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<canvas id="grafico"></canvas>

</div>

<script>

const firebaseConfig={
apiKey:"A...",
authDomain:"ingreso-al-aip---2026.firebaseapp.com",
databaseURL:"https://ingreso-al-aip---2026-default-rtdb.firebaseio.com",
projectId:"ingreso-al-aip---2026"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const dias=["Lunes","Martes","Miércoles","Jueves","Viernes"];
const horas=["1:00-1:45","1:45-2:30","2:30-3:15","3:15-4:00","RECREO","4:20-5:05","5:05-5:50","5:50-6:35"];

let seleccionados=[];

function crearHorario(){

const cont=document.getElementById("horarios");
cont.innerHTML="";

const tabla=document.createElement("table");

let header="<tr><th>Hora</th>";
dias.forEach(d=>header+=`<th>${d}</th>`);
header+="</tr>";
tabla.innerHTML=header;

horas.forEach(h=>{

if(h==="RECREO"){
tabla.innerHTML+=`<tr><td colspan="6" class="recreo">☕ RECREO (4:00-4:20)</td></tr>`;
return;
}

let fila=`<tr><td>${h}</td>`;
dias.forEach(d=>{
let id=d+" "+h;
fila+=`<td class="slot" data-id="${id}">Disponible</td>`;
});
fila+="</tr>";
tabla.innerHTML+=fila;

});

cont.appendChild(tabla);

// MULTI SELECCIÓN
document.querySelectorAll(".slot").forEach(c=>{
c.onclick=()=>{

if(c.classList.contains("ocupado")) return;

const id=c.dataset.id;
const dia=id.split(" ")[0];

if(seleccionados.includes(id)){
  seleccionados=seleccionados.filter(x=>x!==id);
  c.classList.remove("seleccionado");
  return;
}

if(seleccionados.length>=3){
  alert("Máximo 3 horas");
  return;
}

if(seleccionados.length>0){
  const diaBase=seleccionados[0].split(" ")[0];
  if(dia!==diaBase){
    alert("Debe ser el mismo día");
    return;
  }
}

seleccionados.push(id);
c.classList.add("seleccionado");

};
});

}

// RESERVAR MULTIPLE
function reservar(){

const docente=document.getElementById("docente").value;
const semana=document.getElementById("semana").value;

if(!docente)return alert("Seleccione docente");
if(seleccionados.length===0)return alert("Seleccione horario");

const horasOrden=["1:00-1:45","1:45-2:30","2:30-3:15","3:15-4:00","4:20-5:05","5:05-5:50","5:50-6:35"];

seleccionados.sort((a,b)=>a.localeCompare(b));

let indices=seleccionados.map(s=>horasOrden.indexOf(s.split(" ")[1]));

for(let i=0;i<indices.length-1;i++){
if(indices[i+1]!==indices[i]+1){
alert("Horas no consecutivas");
return;
}
}

let checks=seleccionados.map(id=>db.ref("reservas/"+semana+"/"+id).once("value"));

Promise.all(checks).then(res=>{

for(let r of res){
if(r.exists()){
alert("Una hora ya está ocupada");
return;
}
}

const fecha=new Date().toLocaleString();

seleccionados.forEach(id=>{
db.ref("reservas/"+semana+"/"+id).set({
nombre:docente,
asistio:false,
fecha:fecha
});
});

// BOLETA QR
const { jsPDF } = window.jspdf;
const textoQR=docente+" | "+seleccionados.join(", ")+" | "+fecha;

QRCode.toDataURL(textoQR,function(err,url){

const doc=new jsPDF();

doc.text("BOLETA AIP",20,20);
doc.text("Docente: "+docente,20,40);

let y=50;
doc.text("Horarios:",20,y);

y+=10;
seleccionados.forEach(h=>{
doc.text("- "+h,20,y);
y+=10;
});

doc.text("Fecha: "+fecha,20,y);

doc.addImage(url,"PNG",20,y+10,50,50);
doc.text("PIP: YARVIN RS",20,y+70);

doc.save("boleta.pdf");

});

seleccionados=[];
document.querySelectorAll(".slot").forEach(x=>x.classList.remove("seleccionado"));

alert("Reservas guardadas");
cargar();

});

}

// CARGAR
function cargar(){

const semana=document.getElementById("semana").value;

document.querySelectorAll(".slot").forEach(s=>{
s.classList.remove("ocupado");
s.textContent="Disponible";
});

db.ref("reservas/"+semana).once("value",snap=>{
snap.forEach(child=>{
document.querySelectorAll(".slot").forEach(s=>{
if(s.dataset.id===child.key){
s.classList.add("ocupado");
s.innerHTML=child.val().nombre;
}
});
});
});

cargarAdmin();
}

// ADMIN
function activarAdmin(){
if(prompt("Clave")=="yarvin2026"){
document.getElementById("adminPanel").style.display="block";
cargarAdmin();
}
}

function cargarAdmin(){
const tabla=document.getElementById("tabla");
tabla.innerHTML="";

db.ref("reservas").once("value",snap=>{
snap.forEach(sem=>{
sem.forEach(h=>{
tabla.innerHTML+=`
<tr>
<td>${sem.key}</td>
<td>${h.key}</td>
<td>${h.val().nombre}</td>
<td>${h.val().asistio?"🟢":"🔴"}</td>
<td>
<button onclick="asistio('${sem.key}','${h.key}')">✔</button>
<button onclick="eliminar('${sem.key}','${h.key}')">🗑</button>
</td>
</tr>`;
});
});
});
}

function asistio(s,h){
db.ref("reservas/"+s+"/"+h+"/asistio").set(true);
cargar();
}

function eliminar(s,h){
db.ref("reservas/"+s+"/"+h).remove();
cargar();
}

// EXCEL
function exportarExcel(){
db.ref("reservas").once("value",snap=>{
let csv="Semana,Horario,Docente\n";
snap.forEach(sem=>{
sem.forEach(h=>{
csv+=`${sem.key},${h.key},${h.val().nombre}\n`;
});
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="reporte.csv";
a.click();
});
}

// RANKING
function verRanking(){
db.ref("reservas").once("value",snap=>{
let cont={};
snap.forEach(sem=>{
sem.forEach(h=>{
let d=h.val();
if(d.asistio){
if(!cont[d.nombre])cont[d.nombre]=0;
cont[d.nombre]++;
}
});
});
alert(JSON.stringify(cont,null,2));
});
}

// ESTADISTICAS
function verEstadisticas(){
db.ref("reservas").once("value",snap=>{
let total=0,asis=0;
snap.forEach(sem=>{
sem.forEach(h=>{
total++;
if(h.val().asistio)asis++;
});
});
new Chart(document.getElementById("grafico"),{
type:"doughnut",
data:{labels:["Asistió","Faltó"],datasets:[{data:[asis,total-asis]}]}
});
});
}

document.getElementById("semana").addEventListener("change",cargar);

crearHorario();
cargar();

</script>

</body>
</html>
