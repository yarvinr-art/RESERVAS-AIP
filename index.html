<script>

// FECHAS DE INICIO (Lunes) POR SEMANA
const fechasInicioSemana = {
  "Semana del 6 al 10 Abril":       new Date(2025, 3, 6),   // 6 Abril
  "Semana del 13 al 17 Abril":      new Date(2025, 3, 13),  // 13 Abril
  "Semana del 20 al 24 Abril":      new Date(2025, 3, 20),  // 20 Abril
  "Semana del 27 Abril al 1 Mayo":  new Date(2025, 3, 27),  // 27 Abril
  "Semana del 4 al 8 Mayo":         new Date(2025, 4, 4),   // 4 Mayo
};

const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function obtenerFechasDias(semana) {
  const inicio = fechasInicioSemana[semana];
  if (!inicio) return ["Lunes","Martes","Miércoles","Jueves","Viernes"];

  const nombres = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
  return nombres.map((dia, i) => {
    const fecha = new Date(inicio);
    fecha.setDate(inicio.getDate() + i);
    return { nombre: dia, dia: fecha.getDate(), mes: meses[fecha.getMonth()] };
  });
}

// COLOR
function obtenerColor(nombre){
let hash=0;
for(let i=0;i<nombre.length;i++){
hash = nombre.charCodeAt(i) + ((hash<<5)-hash);
}
let color="#";
for(let i=0;i<3;i++){
let value=(hash>>(i*8))&255;
color+=("00"+value.toString(16)).slice(-2);
}
return color;
}

// FIREBASE
const firebaseConfig={
apiKey:"A...",
authDomain:"ingreso-al-aip---2026.firebaseapp.com",
databaseURL:"https://ingreso-al-aip---2026-default-rtdb.firebaseio.com",
projectId:"ingreso-al-aip---2026"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const dias=["Lunes","Martes","Miércoles","Jueves","Viernes"];
const horas=["1:00-1:45","1:45-2:30","2:30-3:15","3:15-4:00","RECREO","4:20-5:05","5:05-5:50","5:50-6:35"];

let seleccionados=[];

// HORARIO
function crearHorario(){

const semana = document.getElementById("semana").value;
const diasConFecha = obtenerFechasDias(semana);

const cont=document.getElementById("horarios");
cont.innerHTML="";
const tabla=document.createElement("table");

let header="<tr><th>Hora</th>";
diasConFecha.forEach(d => {
  if (typeof d === "object") {
    header += `<th>${d.nombre}<br><span class="fecha-dia">${d.dia} ${d.mes}</span></th>`;
  } else {
    header += `<th>${d}</th>`;
  }
});
header+="</tr>";
tabla.innerHTML=header;

horas.forEach(h=>{
if(h==="RECREO"){
tabla.innerHTML+=`<tr><td colspan="6" class="recreo">RECREO</td></tr>`;
return;
}
let fila=`<tr><td>${h}</td>`;
dias.forEach(d=>{
let id=d+" "+h;
fila+=`<td class="slot" data-id="${id}">Disponible</td>`;
});
fila+="</tr>";
tabla.innerHTML+=fila;
});

cont.appendChild(tabla);

document.querySelectorAll(".slot").forEach(c=>{
c.onclick=()=>{
if(c.classList.contains("ocupado")) return;

const id=c.dataset.id;

if(seleccionados.includes(id)){
seleccionados=seleccionados.filter(x=>x!==id);
c.classList.remove("seleccionado");
return;
}

seleccionados.push(id);
c.classList.add("seleccionado");
};
});

}

// SEMANAS SIN BOLETA PDF
const semanasSinBoleta = [
  "Semana del 20 al 24 Abril",
  "Semana del 27 Abril al 1 Mayo",
  "Semana del 4 al 8 Mayo"
];

// RESERVAR
function reservar(){

const docente=document.getElementById("docente").value;
const semana=document.getElementById("semana").value;
const tema=document.getElementById("tema").value;

if(!docente)return alert("Seleccione docente");
if(!tema)return alert("Seleccione el tema de la sesión");
if(seleccionados.length===0)return alert("Seleccione horario");

const fecha=new Date().toLocaleString();

seleccionados.forEach(id=>{
db.ref("reservas/"+semana+"/"+id).set({
nombre:docente,
tema:tema,
asistio:false,
fecha:fecha
});
});

// Verificar si esta semana genera boleta
if(semanasSinBoleta.includes(semana)){
  seleccionados=[];
  document.querySelectorAll(".slot").forEach(x=>x.classList.remove("seleccionado"));
  cargar();
  return;
}

// QR y BOLETA PDF solo para semanas habilitadas
const baseURL = window.location.origin + window.location.pathname;

const textoQR = baseURL + "?scan=" + encodeURIComponent(
  semana + "||" + seleccionados.join(",")
);

const { jsPDF } = window.jspdf;

QRCode.toDataURL(textoQR,function(err,url){

const doc=new jsPDF();

doc.text("BOLETA AIP",20,20);
doc.text("Docente: "+docente,20,40);

let y=50;
seleccionados.forEach(h=>{
doc.text("- "+h,20,y);
y+=10;
});

doc.addImage(url,"PNG",20,y+10,50,50);
doc.save("boleta.pdf");

});

seleccionados=[];
document.querySelectorAll(".slot").forEach(x=>x.classList.remove("seleccionado"));

cargar();

}

// QR
function detectarQR(){

const params=new URLSearchParams(window.location.search);
const data=params.get("scan");

if(!data)return;

const [semana,horarios]=data.split("||");
const lista=horarios.split(",");

lista.forEach(h=>{
db.ref("reservas/"+semana+"/"+h+"/asistio").set(true);
});

alert("Asistencia registrada");

window.location.href=window.location.pathname;

}

// CARGAR
function cargar(){

const semana=document.getElementById("semana").value;

document.querySelectorAll(".slot").forEach(s=>{
s.classList.remove("ocupado");
s.style.background="";
s.textContent="Disponible";
});

db.ref("reservas/"+semana).once("value",snap=>{
snap.forEach(child=>{
document.querySelectorAll(".slot").forEach(s=>{
if(s.dataset.id===child.key){

const nombre=child.val().nombre;
const tema=child.val().tema||"";
const color=obtenerColor(nombre);

s.classList.add("ocupado");
s.style.background=color;
s.style.color="white";
s.innerHTML=`<b>${nombre}</b>${tema ? `<br><span style="font-size:10px;opacity:0.9">📚 ${tema}</span>` : ""}`;

}
});
});
});

cargarAdmin();
cargarGrafico();
}

// ADMIN
function activarAdmin(){
if(prompt("Clave")=="yarvin2026"){
document.getElementById("adminPanel").style.display="block";
cargarAdmin();
cargarGrafico();
}
}

function cargarAdmin(){

const semana=document.getElementById("semana").value;
const tabla=document.getElementById("tabla");
tabla.innerHTML="";

db.ref("reservas/"+semana).once("value",snap=>{
snap.forEach(h=>{
tabla.innerHTML+=`
<tr>
<td>${semana}</td>
<td>${h.key}</td>
<td>${h.val().nombre}</td>
<td>${h.val().tema||"-"}</td>
<td>${h.val().asistio?"🟢":"🔴"}</td>
<td>
<button onclick="asistio('${semana}','${h.key}')">✔</button>
<button onclick="eliminar('${semana}','${h.key}')">🗑</button>
</td>
</tr>`;
});
});
}

// GRAFICO
function cargarGrafico(){

const semana=document.getElementById("semana").value;

db.ref("reservas/"+semana).once("value",snap=>{
let total=0,asis=0;

snap.forEach(h=>{
total++;
if(h.val().asistio)asis++;
});

new Chart(document.getElementById("grafico"),{
type:"doughnut",
data:{
labels:["Asistió","Faltó"],
datasets:[{data:[asis,total-asis]}]
}
});

});
}

function asistio(s,h){
db.ref("reservas/"+s+"/"+h+"/asistio").set(true);
cargar();
}

function eliminar(s,h){
db.ref("reservas/"+s+"/"+h).remove();
cargar();
}

// EXCEL
function exportarExcel(){

const semana=document.getElementById("semana").value;

db.ref("reservas/"+semana).once("value",snap=>{

let csv="Semana,Horario,Docente,Tema,Asistencia\n";

snap.forEach(h=>{
csv+=`${semana},${h.key},${h.val().nombre},${h.val().tema||"-"},${h.val().asistio?"SI":"NO"}\n`;
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="asistencia_"+semana+".csv";
a.click();

});

}

document.getElementById("semana").addEventListener("change",()=>{
  crearHorario();
  cargar();
});

crearHorario();
cargar();
detectarQR();

</script>

}
</script>
