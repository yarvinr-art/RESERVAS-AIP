<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIP Reservas PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Animaciones -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
}

h2{
  margin-top:10px;
}

/* CONTENEDOR */
.container{
  background:white;
  color:black;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* SELECT */
select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  width:90%;
  max-width:300px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  margin-top:10px;
}

/* TARJETAS HORARIO */
.card{
  background:#3498db;
  color:white;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.card:hover{
  transform:scale(1.05);
}

.card.seleccionado{
  background:#2ecc71;
}

.card.ocupado{
  background:#7f8c8d;
  cursor:not-allowed;
}

/* RECREO */
.recreo{
  background:#f39c12;
  font-weight:bold;
  border-radius:12px;
  padding:10px;
}

/* BOTONES */
button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  background:#27ae60;
  color:white;
  font-size:16px;
}

/* ADMIN */
.admin{
  display:none;
}

/* TABLA ADMIN */
table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  border:1px solid #ccc;
  padding:6px;
  font-size:12px;
}

</style>
</head>

<body>

<!-- BOTÓN SECRETO -->
<div onclick="activarAdmin()" style="position:fixed;top:0;left:0;width:40px;height:40px;"></div>

<h2>📚 AULA DE INNOVACIÓN PEDAGÓGICA</h2>

<div class="container">

<select id="semana">
<option>Semana 23-27 Marzo</option>
<option>Semana 30 Marzo - 2 Abril</option>
</select>

<br>

<select id="docente">
<option value="">Seleccione docente</option>
<option>REYNA TUESTA LUIS ENRIQUE</option>
<option>CRUZ YCHO, BEATRIZ</option>
<option>CARHUANCHO AVILES JANETH</option>
<option>SALAS HUAYLLA, JORGE VICENTE</option>
<option>CAMONES PULIDO, LEDGARDO</option>
<option>PADILLA SANCHEZ, LORD ENRIQUE</option>
<option>APAZA ROBLES ROBERTO JORGE</option>
</select>

<div class="grid" id="horarios"></div>

<button onclick="reservar()">Reservar</button>

</div>

<!-- ADMIN -->
<div class="container admin" id="adminPanel">

<h3>🔐 PANEL ADMIN</h3>

<button onclick="exportarExcel()">Exportar Excel</button>

<table>
<thead>
<tr>
<th>Semana</th>
<th>Horario</th>
<th>Docente</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

// FIREBASE
const firebaseConfig={
apiKey:"A...",
authDomain:"ingreso-al-aip---2026.firebaseapp.com",
databaseURL:"https://ingreso-al-aip---2026-default-rtdb.firebaseio.com",
projectId:"ingreso-al-aip---2026"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// HORARIOS
const dias=["Lunes","Martes","Miércoles","Jueves","Viernes"];
const horas=[
"1:00-1:45","1:45-2:30","2:30-3:15","3:15-4:00",
"RECREO",
"4:20-5:05","5:05-5:50","5:50-6:35"
];

const cont=document.getElementById("horarios");
let seleccion=null;

// CREAR TARJETAS
horas.forEach(h=>{

  if(h==="RECREO"){
    let div=document.createElement("div");
    div.className="recreo";
    div.innerText="☕ RECREO (4:00-4:20)";
    cont.appendChild(div);
    return;
  }

  dias.forEach(d=>{
    let id=d+" "+h;

    let card=document.createElement("div");
    card.className="card";
    card.dataset.id=id;
    card.innerHTML=`<b>${d}</b><br>${h}`;

    card.onclick=()=>{
      if(card.classList.contains("ocupado")) return;

      document.querySelectorAll(".card").forEach(c=>c.classList.remove("seleccionado"));
      card.classList.add("seleccionado");
      seleccion=id;
    };

    cont.appendChild(card);
  });

});

// RESERVAR
function reservar(){

  const docente=document.getElementById("docente").value;
  const semana=document.getElementById("semana").value;

  if(!docente) return alert("Seleccione docente");
  if(!seleccion) return alert("Seleccione horario");

  let ruta="reservas/"+semana+"/"+seleccion;

  db.ref(ruta).once("value",snap=>{
    if(snap.exists()) return alert("Horario ocupado");

    db.ref(ruta).set({nombre:docente});

    alert("Reserva guardada");
    cargarDatos();
  });
}

// CARGAR
function cargarDatos(){

  const semana=document.getElementById("semana").value;

  document.querySelectorAll(".card").forEach(c=>{
    c.classList.remove("ocupado");
    c.innerHTML=c.innerHTML.split("<br>")[0]+"<br>"+c.dataset.id.split(" ")[1];
  });

  db.ref("reservas/"+semana).once("value",snap=>{
    snap.forEach(child=>{
      let d=child.val();

      document.querySelectorAll(".card").forEach(c=>{
        if(c.dataset.id===child.key){
          c.classList.add("ocupado");
          c.innerHTML="<b>"+d.nombre+"</b>";
        }
      });
    });
  });

  cargarAdmin();
}

// ADMIN
function activarAdmin(){
  const clave=prompt("Clave:");
  if(clave==="yarvin2026"){
    document.getElementById("adminPanel").style.display="block";
    cargarAdmin();
  }
}

// TABLA ADMIN
function cargarAdmin(){

  const tabla=document.getElementById("tabla");
  tabla.innerHTML="";

  db.ref("reservas").once("value",snap=>{
    snap.forEach(sem=>{
      sem.forEach(h=>{
        tabla.innerHTML+=`
        <tr>
        <td>${sem.key}</td>
        <td>${h.key}</td>
        <td>${h.val().nombre}</td>
        </tr>
        `;
      });
    });
  });
}

// EXCEL
function exportarExcel(){
  db.ref("reservas").once("value",snap=>{
    let csv="Semana,Horario,Docente\n";
    snap.forEach(sem=>{
      sem.forEach(h=>{
        csv+=`${sem.key},${h.key},${h.val().nombre}\n`;
      });
    });

    const blob=new Blob([csv]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="reporte.csv";
    a.click();
  });
}

// CAMBIO SEMANA
document.getElementById("semana").addEventListener("change",cargarDatos);

// INICIO
cargarDatos();

</script>

</body>
</html>
